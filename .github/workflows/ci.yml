name: CI

on:
  push:
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Lint (desktop feature)
        run: cargo clippy --no-default-features --features desktop -- -D warnings

      - name: Check (desktop feature)
        run: cargo check --no-default-features --features desktop

      - name: Check (android target, mobile feature)
        run: cargo check --target aarch64-linux-android --no-default-features --features mobile
